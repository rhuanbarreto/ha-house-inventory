name: Release add-on

# Automated release pipeline using simple-release (Conventional Commits):
#
#   1. Push conventional commits to main → creates a release PR with
#      bumped version + changelog (simple-release-action).
#   2. Merge the release PR → triggers this workflow again.
#   3. simple-release detects a release commit → creates git tag + GitHub Release.
#   4. Docker images for amd64 and aarch64 are built and pushed to GHCR.
#
# Version bump rules (from Conventional Commits):
#   feat  → minor bump   |   fix  → patch bump   |   feat!/fix!  → major bump

on:
  issue_comment:
    types: [created, deleted]
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write
  statuses: write

jobs:
  # --------------------------------------------------------------------------
  # 1. Context check — determine whether to create a release PR or publish.
  # --------------------------------------------------------------------------
  check:
    name: Context check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      continue: ${{ steps.check.outputs.continue }}
      workflow: ${{ steps.check.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install release tooling
        run: bun install --frozen-lockfile || bun install

      - name: Context check
        id: check
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: check
          github-token: ${{ github.token }}
          branch: release

  # --------------------------------------------------------------------------
  # 2. Create or update the release PR (bumps version + changelog).
  # --------------------------------------------------------------------------
  pull-request:
    name: Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    if: needs.check.outputs.workflow == 'pull-request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install release tooling
        run: bun install --frozen-lockfile || bun install

      - name: Create or update pull request
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: pull-request
          github-token: ${{ github.token }}
          branch: release

      - name: Run CI on release branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/release --jq '.object.sha' 2>/dev/null) || true

          if [ -z "$HEAD_SHA" ]; then
            echo "No release branch found — nothing to validate"
            exit 0
          fi

          gh workflow run build.yml --ref release
          sleep 5
          RUN_ID=$(gh run list --branch release --workflow build.yml --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Waiting for CI run $RUN_ID..."
          gh run watch "$RUN_ID" --exit-status && STATUS=success || STATUS=failure

          gh api repos/${{ github.repository }}/statuses/$HEAD_SHA \
            -f state="$STATUS" \
            -f context="Validate Code" \
            -f description="CI $STATUS" \
            --silent

  # --------------------------------------------------------------------------
  # 3. Release — create git tag + GitHub Release via simple-release.
  # --------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    if: needs.check.outputs.workflow == 'release'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install release tooling
        run: bun install --frozen-lockfile || bun install

      - name: Ensure main is up-to-date
        run: git pull --rebase origin main

      - name: Release
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: release
          github-token: ${{ github.token }}
          branch: release

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' house-inventory/config.yaml \
            | sed 's/version: *"\?\([^"]*\)"\?/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Released version: ${VERSION}"

  # --------------------------------------------------------------------------
  # 4. Build and push Docker images for each architecture.
  # --------------------------------------------------------------------------
  build:
    name: Build & push (${{ matrix.arch }})
    needs: release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.19
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.19
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up QEMU
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./house-inventory
          file: ./house-inventory/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-house-inventory/${{ matrix.arch }}-house-inventory:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-house-inventory/${{ matrix.arch }}-house-inventory:latest
          cache-from: type=gha,scope=release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.arch }}
          labels: |
            io.hass.name=House Inventory
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
            io.hass.version=${{ needs.release.outputs.version }}
